<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB4UizoGIlThbY0_DN3wmb0cT4NidTOetE",
    authDomain: "stg2026-196cb.firebaseapp.com",
    databaseURL: "https://stg2026-196cb-default-rtdb.firebaseio.com",
    projectId: "stg2026-196cb",
    storageBucket: "stg2026-196cb.firebasestorage.app",
    messagingSenderId: "381060427596",
    appId: "1:381060427596:web:371f963cab0970750869e9"
  };


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// =======================
// DADOS PADRÃO
// =======================

const defaultSpendings = [
{ item: "Transfer Juiz de Fora x Galeão", category: "Transporte", clp: 0, brl: 1200, link: "", payer: "Grupo", status: "A definir" }
];

const defaultQuotes = [];

const defaultItinerary = [];

const defaultDocs = [];

const defaultClothing = [];

// =======================
// ESTADO
// =======================

let state = {
exchangeRate: 179.5,
spendings: [],
quotes: [],
itinerary: [],
docs: [],
clothing: []
};

// =======================
// INICIAR
// =======================

window.onload = async function () {

resetStateToDefaults();

await loadFromCloud();

buildTable();

recalculateAll();

};

// =======================
// FIREBASE
// =======================

async function saveToCloud() {

await setDoc(
doc(db, "planilhas", "santiago2026"),
state
);

showNotification("Atualizado online ☁️");

}

async function loadFromCloud() {

const docRef = doc(db, "planilhas", "santiago2026");

const docSnap = await getDoc(docRef);

if (docSnap.exists()) {

state = docSnap.data();

document.getElementById('exchangeRateInput').value =
state.exchangeRate;

showNotification("Dados carregados ☁️");

}

}

// =======================
// LOCAL STORAGE + CLOUD
// =======================

async function saveToLocalStorage() {

localStorage.setItem(
'chile_trip_state',
JSON.stringify(state)
);

await saveToCloud();

showNotification("Planilha salva!");

}

// =======================
// RESET
// =======================

function resetStateToDefaults() {

state.exchangeRate = 179.5;

state.spendings =
JSON.parse(JSON.stringify(defaultSpendings));

state.quotes =
JSON.parse(JSON.stringify(defaultQuotes));

state.itinerary =
JSON.parse(JSON.stringify(defaultItinerary));

state.docs =
JSON.parse(JSON.stringify(defaultDocs));

state.clothing =
JSON.parse(JSON.stringify(defaultClothing));

}

// =======================
// TABELA
// =======================

function buildTable() {

const tbody =
document.getElementById('tableBody');

tbody.innerHTML = '';

state.spendings.forEach((item, index) => {

const tr = document.createElement('tr');

tr.innerHTML = `
<td class="p-3">
<input
type="text"
value="${item.item}"
onchange="updateSpending(${index}, 'item', this.value)"
class="w-full border p-2 rounded"
/>
</td>

<td class="p-3">
<input
type="number"
value="${item.brl}"
oninput="updateSpendingValue(${index}, this.value)"
class="w-full border p-2 rounded"
/>
</td>

<td class="p-3 text-center">
<button
onclick="deleteRow(${index})"
class="text-red-500"
>
Excluir
</button>
</td>
`;

tbody.appendChild(tr);

});

}

// =======================
// UPDATE
// =======================

window.updateSpending = function(index, key, value) {

state.spendings[index][key] = value;

saveToLocalStorage();

};

window.updateSpendingValue = function(index, value) {

state.spendings[index].brl =
parseFloat(value) || 0;

recalculateAll();

saveToLocalStorage();

};

// =======================
// ADICIONAR
// =======================

window.addRow = function () {

state.spendings.push({
item: "Novo Item",
category: "Outros",
clp: 0,
brl: 0,
link: "",
payer: "Grupo",
status: "A definir"
});

buildTable();

saveToLocalStorage();

};

// =======================
// EXCLUIR
// =======================

window.deleteRow = function(index) {

state.spendings.splice(index, 1);

buildTable();

recalculateAll();

saveToLocalStorage();

};

// =======================
// TOTAIS
// =======================

function recalculateAll() {

let total = 0;

state.spendings.forEach(item => {

total += Number(item.brl || 0);

});

const totalBrlCard =
document.getElementById('totalBrlCard');

if (totalBrlCard) {

totalBrlCard.innerText =
new Intl.NumberFormat(
'pt-BR',
{
style: 'currency',
currency: 'BRL'
}
).format(total);

}

}

// =======================
// NOTIFICAÇÃO
// =======================

function showNotification(message) {

console.log(message);

}

</script>
